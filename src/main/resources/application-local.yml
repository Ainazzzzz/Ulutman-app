spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ulutman
    username: ulutmanuser
    password: localpassword

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your_google_client_id
            client-secret: your_google_client_secret
            redirect-uri: http://localhost:8081/login/oauth2/code/google

jwt:
  secret: localdevsecretkey_at_least_32_characters_long_for_hs256

minio:
  url: https://fly.storage.tigris.dev
  access-key: your_aws_access_key_id
  secret-key: your_aws_secret_access_key
  bucket: ulutman-images
  region: auto
